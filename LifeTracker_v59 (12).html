<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Tracker</title>
<!-- Added Debug Mode -->
<script>
    const debug = true; // Global debug flag

    function debugLog(message) {
        if (debug) {
            console.log(message);
        }
    }
</script>

<!-- Added Theme Switcher -->
<script>
    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
        const currentTheme = localStorage.getItem('theme') || 'light';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        setTheme(newTheme);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);
    });
</script>

<!-- Added Performance Monitoring -->
<script>
    const performanceData = {};

    function monitorPerformance(fn, fnName) {
        const start = performance.now();
        fn();
        const duration = performance.now() - start;
        performanceData[fnName] = duration;
        debugLog(fnName + ' executed in ' + duration + 'ms');
    }
</script>

<style>
    /* Improved Mobile Responsiveness */
    body {
       font-family: Arial, sans-serif;
       margin: 0;
       padding: 0;
       display: flex;
       flex-direction: column;
       align-items: center;
       justify-content: center;
       height: 100vh;
     }
     @media (max-width: 768px) {
         /* Responsive adjustments */
         body {
             flex-direction: column;
         }
     }
</style>
</head>
<body>
    <h1>Welcome to Life Tracker</h1>
    <button onclick="toggleTheme()">Toggle Theme</button>

    <!-- Data Backup/Restore Functionality -->
    <button onclick="exportData()">Export Data</button>
    <input type="file" id="fileInput" />
    <button onclick="importData()">Import Data</button>

    <script>
        function exportData() {
            const data = JSON.stringify(getData());
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data_backup.json';
            a.click();
            debugLog('Data exported successfully.');
        }

        function importData() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = JSON.parse(event.target.result);
                restoreData(data);
                debugLog('Data imported successfully.');
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
